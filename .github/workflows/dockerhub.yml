name: Build and push Docker images

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  dockerhub:
    runs-on: ubuntu-latest
    env:
      POSTGRES_DB: ${{ vars.POSTGRES_DB }}
      POSTGRES_ADMIN_USER: ${{ vars.POSTGRES_ADMIN_USER }}
      POSTGRES_APP_USER: ${{ vars.POSTGRES_APP_USER }}
      POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
      POSTGRES_APP_PASSWORD: ${{ secrets.POSTGRES_APP_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build images from compose
        run: docker compose build backend frontend

      - name: Push images from compose
        run: docker compose push backend frontend
