services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: meetup_helper
      POSTGRES_USER: meetup
      POSTGRES_PASSWORD: meetup
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meetup -d meetup_helper"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    image: msj102/meetup-helper-backend
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://meetup:meetup@db:5432/meetup_helper
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    image: msj102/meetup-helper-frontend
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "4200:80"

volumes:
  postgres-data:
